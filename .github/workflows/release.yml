name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Check SPA bundle
        run: npm run check:spa

      - run: npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: build-output
          path: |
            dist/
            src/dashboard/frontend/dist/
            *.tgz

      - name: Audit production dependencies
        run: npm audit --production || true

      - name: List production dependencies
        run: npm list --depth=0

  npm:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-output

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binary:
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-output

      - name: Build binary
        run: npx tsx scripts/build-binaries.ts --target ${{ matrix.target }}

      - name: Smoke test — healthz
        run: npx tsx scripts/smoke/healthz.ts dist/binaries/${{ matrix.target }}/ccmux-${{ matrix.target }}${{ matrix.target == 'win-x64' && '.exe' || '' }}

      - name: Smoke test — sse-roundtrip
        run: npx tsx scripts/smoke/sse-roundtrip.ts dist/binaries/${{ matrix.target }}/ccmux-${{ matrix.target }}${{ matrix.target == 'win-x64' && '.exe' || '' }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          draft: true
          files: dist/binaries/${{ matrix.target }}/ccmux-*

  bun-fallback:
    needs: [build, binary]
    if: failure()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1

      - run: npm ci

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-output

      - name: Build binary (bun fallback)
        run: npx tsx scripts/build-binaries.ts --target ${{ matrix.target }} --bun

      - name: Smoke test — healthz
        run: npx tsx scripts/smoke/healthz.ts dist/binaries/${{ matrix.target }}/ccmux-${{ matrix.target }}${{ matrix.target == 'win-x64' && '.exe' || '' }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          draft: true
          files: dist/binaries/${{ matrix.target }}/ccmux-*

  docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/ccmux:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ccmux:latest
          load: false

      - name: Smoke test — docker version
        run: |
          docker build -t ccmux-smoke .
          docker run --rm ccmux-smoke --version

      - name: Push final tags
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ccmux:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ccmux:latest

  assert-artifacts:
    needs: [npm, binary, docker]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Checking release assets for $TAG..."
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          EXPECTED_BINARIES=("ccmux-linux-x64" "ccmux-linux-arm64" "ccmux-macos-x64" "ccmux-macos-arm64" "ccmux-win-x64")
          MISSING=()
          for bin in "${EXPECTED_BINARIES[@]}"; do
            if ! echo "$ASSETS" | grep -q "$bin"; then
              MISSING+=("$bin")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Missing artifacts: ${MISSING[*]}"
            exit 1
          fi
          echo "All expected artifacts present."

      - name: Promote release from draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
